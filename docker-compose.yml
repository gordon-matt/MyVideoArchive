# Minimal stack: .NET 10 (Alpine) + PostgreSQL 18 (Alpine)
# Run from repo root: docker compose up -d
# App: http://localhost:8080
#
# ── Authentication ─────────────────────────────────────────────────────────────
# By default the app uses its built-in ASP.NET Core Identity (local user/password
# database). To switch to Keycloak for centralised, single-sign-on across multiple
# apps, uncomment the "Keycloak" environment variables below and the "keycloak"
# service at the bottom of this file.
#
# See docs/KEYCLOAK_SETUP.md for full Keycloak configuration instructions.

services:
  app:
    build:
      context: .
      dockerfile: MyVideoArchive/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=myvideoarchive;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}"
      # Optional: initial admin created on first run (defaults: admin@myvideoarchive.local / Admin@123)
      # SeedAdmin__Email: admin@example.com
      # SeedAdmin__Password: "${ADMIN_PASSWORD}"
      # Linux path for downloads; override in appsettings on Windows
      VideoDownload__VideoQuality: bestvideo[height=720]+bestaudio/bestvideo[height=720]+bestaudio/bestvideo[height=480]+bestaudio/best
      VideoDownload__OutputPath: /app/data
      VideoDownload__Throttle__MinDelaySeconds: 10
      VideoDownload__Throttle__MaxDelaySeconds: 60
      VideoDownload__Throttle__BatchSize: 25
      VideoDownload__Throttle__BatchWindowMinutes: 30
      YoutubeDL__ExecutablePath: /usr/local/bin/yt-dlp
      YoutubeDL__FFmpegPath: /usr/bin/ffmpeg
      # ── Keycloak (optional) ──────────────────────────────────────────────────
      # Uncomment these three lines to enable Keycloak authentication.
      # Replace the Authority URL with your realm URL and paste in your client secret.
      # Authentication__Provider: Keycloak
      # Authentication__Keycloak__Authority: http://host.docker.internal:8081/realms/myvideoarchive
      # Authentication__Keycloak__ClientId: myvideoarchive
      # Authentication__Keycloak__ClientSecret: ${KEYCLOAK_CLIENT_SECRET}
    volumes:
      # Host path must exist; ensure D: is in Docker Desktop → Settings → Resources → File sharing
      - D:/_Docker/my-video-archive/videos:/app/data
    depends_on:
      db:
        condition: service_healthy
      # Uncomment to make the app wait for Keycloak to be ready before starting:
      # keycloak:
      #   condition: service_healthy

  db:
    image: postgres:18-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myvideoarchive
    volumes:
      # Postgres 18+ expects mount at /var/lib/postgresql (image uses versioned subdir inside it)
      # Host path must exist; ensure D: is in Docker Desktop → Settings → Resources → File sharing
      - D:/_Docker/my-video-archive/pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Keycloak (optional) ──────────────────────────────────────────────────────
  # Uncomment this service to run Keycloak alongside the app.
  # After first start, open http://localhost:8081 and follow docs/KEYCLOAK_SETUP.md.
  #
  # keycloak:
  #   image: quay.io/keycloak/keycloak:26.5.5
  #   container_name: keycloak
  #   ports:
  #     - "8081:8080"
  #   environment:
  #     KC_BOOTSTRAP_ADMIN_USERNAME: admin
  #     KC_BOOTSTRAP_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD:-admin}"
  #     # Persist realm/user data across restarts:
  #     KC_DB: postgres
  #     KC_DB_URL: jdbc:postgresql://db:5432/keycloak
  #     KC_DB_USERNAME: postgres
  #     KC_DB_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
  #   command: start-dev
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 30s
